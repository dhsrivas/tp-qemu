- vfio_pci_passthrough:
    type = qemu_pci_passthrough
    start_vm = no
    only Linux
    only x86_64
    only HostCpuVendor.amd
    pcie_extra_root_port = 0
    vt_ulimit_nofile = 65536
    usb_devices = ""
    auto_cpu_model = "no"
    cpu_model = "host"
    machine_type = "q35"
    extra_params = ""
